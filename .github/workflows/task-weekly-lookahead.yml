name: task-weekly-lookahead

# Look-forward agenda 20j — gros événements à anticiper, post Telegram perso.
# Cf. tasks/weekly_lookahead.py et schedule.yaml.
#
# Requiert :
#   - GCAL_TOKEN_JSON (refresh token OAuth scope calendar)
#   - ANTHROPIC_API_KEY
#   - TELEGRAM_* pour la notif

on:
  # Cron déclenché par le Cloudflare Worker (workflow_dispatch via API)
  # — Dimanche 18:00 UTC (20:00 Paris). Cf. cloudflare-worker/src/index.ts
  # (CRON_TO_WORKFLOW).
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass cadence_days/vacances (dev/test). N'override pas panic ni enabled=false."
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: claudepa-write
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync

      - name: Run task
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GCAL_TOKEN_JSON: ${{ secrets.GCAL_TOKEN_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_PERSO: ${{ secrets.TELEGRAM_CHAT_PERSO }}
          TOKEN_BUDGET_USD: ${{ secrets.TOKEN_BUDGET_USD }}
          FORCE: ${{ inputs.force }}
        run: uv run python -m tasks.weekly_lookahead

      - name: Commit changes
        run: |
          set -e
          git config user.name "claudePA bot"
          git config user.email "bot@claudepa.local"
          git add -A
          if git diff --staged --quiet; then
            echo "no change to commit"
          else
            git commit -m "auto: weekly_lookahead run $(date -u +%FT%TZ)"
            for i in 1 2 3 4; do
              if git push; then break; fi
              sleep $((2 ** i))
            done
          fi
