name: sync-veille-to-main

# OBLIGATION mémoire : les rapports de veille et les handovers de session
# DOIVENT finir sur `main` — sinon le run/la session suivante, qui clone `main`,
# ne retrouve plus la working-memory ni les findings (mémoire inter-run cassée).
#
# Problème : le proxy Claude Code interdit souvent à une routine/session (sur
# une branche `claude/**`) de pousser sur `main`. On ne peut donc PAS compter
# sur la routine pour ça. Cette GHA tourne sur l'infra GitHub (aucun proxy,
# push sur `main` natif) et garantit la synchro, quoi qu'il arrive côté routine.
#
# Quoi : dès qu'un fichier de veille/handover arrive sur une branche `claude/**`,
# on le RECOPIE sur `main` (noms horodatés uniques → zéro conflit) et on fusionne
# `findings.md` en append (anti-conflit). Le push utilise GITHUB_TOKEN, qui ne
# re-déclenche aucun workflow (anti-boucle natif GitHub) → pas de double mail.
#
# Étendu pour la boucle d'auto-tuning des prompts (/adapt_prompt) : on synchronise
# aussi (a) les `feedback/*.md` mis à jour par la routine (statut pending→applied,
# noms horodatés uniques), et (b) les fichiers SOURCE à nom STABLE qu'elle édite —
# `.claude/commands/*.md` (prompts) et `core-memory/*.md` (faits mémoire). Ces
# derniers sont recopiés par OVERWRITE, donc UNIQUEMENT quand le push est un run
# adapt_prompt (présence d'un récap `*-adapt_prompt.md` dans le diff) : la routine
# est alors l'unique éditeur et repart de `main` → last-write-wins voulu, et on ne
# propage jamais par erreur les edits source d'une autre session. C'est CE qui rend
# l'édition de prompt / mémoire effective (le prochain run clone `main`).

on:
  push:
    branches: ["claude/**"]
    paths:
      - "working-memory/*-sydney_opportunities.md"
      - "working-memory/*-weekly_briefing.md"
      - "working-memory/*-ai_jobs_formations.md"
      - "working-memory/*-local_activities.md"
      - "working-memory/*-activities_next10days.md"
      - "working-memory/*-health_watch.md"
      - "working-memory/*-serendipity.md"
      - "working-memory/*-adapt_prompt.md"
      - "working-memory/*-session-*.md"
      - "digests/findings.md"
      - "feedback/*.md"
      - ".claude/commands/*.md"
      - "core-memory/*.md"

permissions:
  contents: write

concurrency:
  group: claudepa-sync-main
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check panic sentinel
        run: |
          if [ -f .panic ]; then
            echo "🔴 .panic présent — abandon de la synchro."
            exit 1
          fi
          echo "no panic, proceeding"

      - name: Sync report/handover files onto main
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.event.after }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, re, subprocess, sys
          from pathlib import Path

          def git(*a, check=True, capture=False):
              return subprocess.run(["git", *a], check=check, text=True,
                                    stdout=subprocess.PIPE if capture else None)

          before = os.environ.get("BEFORE") or ""
          after = os.environ["AFTER"]
          # before nul/invalide (création de branche, force-push) → diff du dernier commit
          valid = bool(before) and subprocess.run(
              ["git", "cat-file", "-e", f"{before}^{{commit}}"],
              stderr=subprocess.DEVNULL).returncode == 0
          if not valid:
              before = f"{after}~1"

          PAT = re.compile(
              r"^(working-memory/.*-(?:sydney_opportunities|weekly_briefing|"
              r"ai_jobs_formations|local_activities|activities_next10days|"
              r"health_watch|serendipity|adapt_prompt)\.md|"
              r"working-memory/.*-session-.*\.md)$")
          # feedback/ : noms horodatés uniques (statut mis à jour) → toujours sûr.
          FEEDBACK = re.compile(r"^feedback/.*\.md$")
          # Fichiers SOURCE à noms STABLES (overwrite) que /adapt_prompt édite :
          # prompts de veille + faits de core-memory. Recopiés SEULEMENT si ce
          # push est un run adapt_prompt (présence d'un récap *-adapt_prompt.md),
          # pour ne jamais propager par erreur des edits d'une autre session.
          ADAPT = re.compile(r"^working-memory/.*-adapt_prompt\.md$")
          # policies.md exclu même en run adapt (garde-fous jamais propagés
          # par ce canal — double sécurité avec l'interdit côté command).
          SOURCE = re.compile(
              r"^(\.claude/commands/.*\.md|core-memory/(?!policies\.md$).*\.md)$")

          diff = git("diff", "--name-only", "--diff-filter=AM", before, after,
                     capture=True).stdout.splitlines()
          is_adapt_run = any(ADAPT.match(f) for f in diff)
          report_files = [
              f for f in diff
              if PAT.match(f) or FEEDBACK.match(f)
              or (is_adapt_run and SOURCE.match(f))
          ]
          findings_changed = "digests/findings.md" in diff
          print("fichiers détectés :", report_files,
                "| findings:", findings_changed)

          if not report_files and not findings_changed:
              print("rien à synchroniser"); sys.exit(0)

          # Capture le contenu depuis la branche (checkout courant) AVANT de basculer.
          contents = {f: Path(f).read_text(encoding="utf-8") for f in report_files}
          branch_findings = (
              Path("digests/findings.md").read_text(encoding="utf-8")
              if findings_changed and Path("digests/findings.md").exists() else None)

          git("config", "user.name", "claudepa-sync[bot]")
          git("config", "user.email",
              "claudepa-sync@users.noreply.github.com")

          def split_entries(txt):
              parts = re.split(r"(?m)^(?=### )", txt)
              return [p for p in parts if p.lstrip().startswith("###")]

          def apply_onto_main():
              """Repart d'origin/main frais, ré-applique, True si un commit est créé."""
              git("fetch", "origin", "main")
              git("checkout", "-B", "main", "origin/main")
              changed = False
              for f, c in contents.items():
                  p = Path(f); p.parent.mkdir(parents=True, exist_ok=True)
                  if not p.exists() or p.read_text(encoding="utf-8") != c:
                      p.write_text(c, encoding="utf-8"); git("add", f)
                      changed = True; print("→ sync:", f)
              if branch_findings is not None:
                  fp = Path("digests/findings.md")
                  cur = fp.read_text(encoding="utf-8") if fp.exists() else ""
                  have = {e.strip() for e in split_entries(cur)}
                  add = [e for e in split_entries(branch_findings)
                         if e.strip() not in have]
                  if add:
                      sep = "\n" if cur and not cur.endswith("\n") else ""
                      fp.write_text(cur + sep + "".join(add), encoding="utf-8")
                      git("add", "digests/findings.md")
                      changed = True; print(f"→ sync: findings.md (+{len(add)})")
              if not changed:
                  return False
              git("commit", "-m", "sync: rapports/handover veille -> main")
              return True

          for attempt in range(5):
              if not apply_onto_main():
                  print("main déjà à jour"); sys.exit(0)
              if subprocess.run(["git", "push", "origin", "main"]).returncode == 0:
                  print("push main OK"); sys.exit(0)
              print(f"push rejeté (course concurrente), reprise {attempt + 1}/5…")
          sys.exit("échec push main après 5 tentatives")
          PY
