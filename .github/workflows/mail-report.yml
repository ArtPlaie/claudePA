name: mail-report

# Envoi automatique par mail des rapports de veille.
#
# Pourquoi : les routines (Claude Code on the web) ne peuvent PAS envoyer en
# SMTP (proxy egress = 443 only) ni dispatcher une GHA (pas de scope
# actions:write). Mais une routine/session pousse son rapport sur git. Ce
# workflow se déclenche sur ce push, lit le(s) rapport(s) de veille ajouté(s)
# et les envoie en SMTP — sur l'infra GHA, où le SMTP brut fonctionne.
#
# Déclenchement : push sur `main` OU sur une branche `claude/**` (session ou
# routine) touchant un fichier working-memory de veille. Découplé de `main`
# EXPRÈS : le harness Claude Code impose souvent une branche de feature aux
# sessions/routines, et un rapport bloqué sur cette branche n'envoyait aucun
# mail. Désormais le mail part quelle que soit la branche — Sylvain n'a plus
# à merger à la main ni à lire les onglets.
# Les commits "auto:" des veilles matchent ; les autres tâches
# (daily_digest, location_context, sliding_window) ne matchent pas (paths).
# Les logs de skip (`*-<veille>-skip.md`) ne matchent pas non plus.
#
# Secrets requis : GMAIL_USER, GMAIL_APP_PASSWORD, MAIL_TO (déjà en place,
# validés par task-mail-test).

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "working-memory/*-sydney_opportunities.md"
      - "working-memory/*-weekly_briefing.md"
      - "working-memory/*-ai_jobs_formations.md"
      - "working-memory/*-local_activities.md"
      - "working-memory/*-activities_next10days.md"
      - "working-memory/*-health_watch.md"
      - "working-memory/*-serendipity.md"

permissions:
  contents: read

concurrency:
  group: claudepa-mail-report-${{ github.sha }}
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check panic sentinel
        run: |
          if [ -f .panic ]; then
            echo "🔴 .panic présent — abandon de l'envoi."
            exit 1
          fi
          echo "no panic, proceeding"

      - name: Find changed veille reports
        id: changed
        run: |
          set -uo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.event.after }}"
          # Garde-fous : si BEFORE est nul/invalide (création de branche,
          # force-push), retombe sur le diff du dernier commit.
          if [ -z "$BEFORE" ] || ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            BEFORE="${AFTER}~1"
          fi
          PATTERN='working-memory/.*-(sydney_opportunities|weekly_briefing|ai_jobs_formations|local_activities|activities_next10days|health_watch|serendipity)\.md$'
          git diff --name-only --diff-filter=AM "$BEFORE" "$AFTER" \
            | grep -E "$PATTERN" > changed.txt || true
          echo "Fichiers détectés :"
          cat changed.txt || true
          if [ ! -s changed.txt ]; then
            echo "Aucun rapport de veille dans ce push — rien à envoyer."
          fi

      - name: Send reports by email
        if: ${{ hashFiles('changed.txt') != '' }}
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          set -euo pipefail
          : "${GMAIL_USER:?secret GMAIL_USER manquant}"
          : "${GMAIL_APP_PASSWORD:?secret GMAIL_APP_PASSWORD manquant}"
          pip install --quiet markdown
          python3 - <<'PY'
          import os, re, smtplib, ssl, sys
          from email.message import EmailMessage
          from pathlib import Path
          import markdown as md

          user = os.environ["GMAIL_USER"]
          pwd = os.environ["GMAIL_APP_PASSWORD"].replace(" ", "")
          to = os.environ.get("MAIL_TO") or user

          # Noms lisibles pour le sujet du mail (pas de slug technique).
          NICE = {
              "sydney_opportunities": "Sydney & Suisse",
              "weekly_briefing": "Briefing de la semaine",
              "ai_jobs_formations": "Jobs & formations IA",
              "local_activities": "Sorties locales",
              "activities_next10days": "À faire ces 10 jours",
              "health_watch": "Veille santé",
              "serendipity": "Serendipity",
          }

          # Retire le front matter YAML en tête (--- ... ---) : c'est de la
          # mémoire interne, Sylvain ne doit jamais le voir dans son mail.
          def strip_front_matter(text):
              return re.sub(r"\A---\s*\n.*?\n---\s*\n", "", text, count=1, flags=re.DOTALL)

          # Enveloppe HTML sobre, lisible dans Gmail (police système, liens
          # cliquables, sections nettes). Le body est déjà du HTML rendu.
          def wrap_html(body_html):
              return (
                  '<div style="font-family:-apple-system,Segoe UI,Roboto,Helvetica,'
                  'Arial,sans-serif;font-size:15px;line-height:1.55;color:#1a1a1a;'
                  'max-width:640px">' + body_html + "</div>"
              )

          files = [l.strip() for l in Path("changed.txt").read_text().splitlines() if l.strip()]
          if not files:
              print("rien à envoyer"); sys.exit(0)

          ctx = ssl.create_default_context()
          with smtplib.SMTP_SSL("smtp.gmail.com", 465, context=ctx, timeout=30) as s:
              s.login(user, pwd)
              for f in files:
                  p = Path(f)
                  if not p.exists():
                      print(f"absent, skip: {f}"); continue
                  # nom: YYYY-MM-DD-HHMM-<task>.md → task + date
                  m = re.match(r"(\d{4}-\d{2}-\d{2})-\d{4}-(.+)\.md$", p.name)
                  date = m.group(1) if m else ""
                  task = m.group(2) if m else p.stem
                  title = NICE.get(task, task)

                  raw = strip_front_matter(p.read_text(encoding="utf-8")).strip()
                  # Pas de nl2br : un retour simple devient une espace (paras
                  # qui coulent), seules les lignes vides séparent — évite les
                  # retours chariot parasites même si la source est wrappée.
                  html = wrap_html(md.markdown(raw, extensions=["extra", "sane_lists"]))

                  msg = EmailMessage()
                  msg["From"] = user
                  msg["To"] = to
                  msg["Subject"] = f"claudePA — {title} ({date})".strip()
                  # Texte brut (markdown sans front matter) en fallback,
                  # version HTML rendue en principal.
                  msg.set_content(raw)
                  msg.add_alternative(html, subtype="html")
                  s.send_message(msg)
                  print(f"OK — envoyé : {f} -> {to}")
          PY
