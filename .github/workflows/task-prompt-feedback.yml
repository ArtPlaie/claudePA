name: task-prompt-feedback

# Pont I/O bête entre la boîte du PA et la routine /adapt_prompt (zéro LLM).
# Cf. tasks/prompt_feedback.py. À chaque run :
#   1. récupère les réponses non-lues de Sylvain → replies/<ts>-<veille>.md
#      (brutes, pending) ; la routine /adapt_prompt décide de tout ensuite ;
#   2. exécute les events mis en file par la routine (calendar/*.md status
#      requested) → création sur l'agenda via l'API Calendar → status created.
#
# Secrets :
#   - GMAIL_USER + GMAIL_APP_PASSWORD (compte PA : IMAP lit l'inbox, même
#     app-password que le SMTP de mail-report ; pas d'OAuth pour la lecture)
#   - GCAL_TOKEN_JSON (OAuth compte de Sylvain, scope calendar.events — écriture
#     agenda ; cf. scripts/setup_gmail_oauth.py --account gcal)
#   - MAIL_TO (adresse de Sylvain : on n'ingère que SES réponses)
#   - TELEGRAM_* pour les notifs best-effort
# Pas de LLM ici (le raisonnement est dans la routine) → pas d'ANTHROPIC_API_KEY.
# Prérequis compte PA : IMAP activé (Gmail → Paramètres → Transfert et POP/IMAP).
#
# Déclenchement : cron GitHub NATIF (pas via Cloudflare Worker). Ici le délai
# 30min-2h des crons natifs est sans importance — l'ingestion de feedback n'est
# pas sensible à la minute — et ça évite de consommer le budget de 5 cron
# triggers du plan gratuit Cloudflare. Tourne plusieurs fois par jour pour que
# tout feedback soit ingéré avant le run 11:00 de la routine /adapt_prompt.

on:
  schedule:
    - cron: "17 */3 * * *"   # toutes les 3h (offset 17min pour éviter la cohue)
  workflow_dispatch:
    inputs:
      force:
        description: "Bypass cadence/vacances (dev/test). N'override pas panic ni enabled=false."
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: claudepa-write
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install deps
        run: uv sync

      - name: Run task
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          GCAL_TOKEN_JSON: ${{ secrets.GCAL_TOKEN_JSON }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_PERSO: ${{ secrets.TELEGRAM_CHAT_PERSO }}
          FORCE: ${{ inputs.force }}
        run: uv run python -m tasks.prompt_feedback

      - name: Commit changes
        run: |
          set -e
          git config user.name "claudePA bot"
          git config user.email "bot@claudepa.local"
          git add -A
          if git diff --staged --quiet; then
            echo "no change to commit"
          else
            git commit -m "auto: prompt_feedback run $(date -u +%FT%TZ)"
            for i in 1 2 3 4; do
              if git push; then break; fi
              sleep $((2 ** i))
            done
          fi
