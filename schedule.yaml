# schedule.yaml — registre des tâches récurrentes
#
# Source de vérité unique pour : cron, canal Telegram, tier modèle,
# statut activé/désactivé. Le code Python (tasks/_lib/schedule.py) lit
# ce fichier au démarrage de chaque workflow.
#
# Note crons : tous en UTC. Le champ `cron:` ci-dessous est INDICATIF
# (lecture humaine + doc). Le déclenchement réel passe par les Cron
# Triggers Cloudflare Worker (cf. cloudflare-worker/wrangler.toml +
# src/index.ts CRON_TO_WORKFLOW) qui appellent l'API workflow_dispatch
# de GH Actions. Précision ~1 min vs 30min-2h des crons natifs GH.
#
# Pour cadences "tous les N jours" non-divisibles, le workflow tourne
# plus souvent et `_lib/schedule.cadence_satisfied()` vérifie la
# dernière exécution dans working-memory/ avant d'agir (cf. `cadence_days`).
#
# Ajout d'une tâche : voir CLAUDE.md > "Pour ajouter une nouvelle tâche".

defaults:
  channel: perso        # perso | famille
  model: sonnet         # haiku | sonnet | opus
  enabled: false        # tâches désactivées par défaut, à activer explicitement
  retry_max: 2
  timeout_minutes: 5
  vacation_safe: false  # si true, la tâche tourne aussi en mode vacances

# Whitelist mode vacances : seules les tâches avec vacation_safe: true
# tournent quand current-location.md a vacation_mode: true.
# Cible V1 : daily_digest, location_context, sliding_window.

tasks:

  mail_review:
    description: "Revue mails 5j passés. Détecte oublis, suggère relances. Lecture seule, drafts uniquement."
    cron: "0 6 * * *"     # daily 06:00 UTC, gated by cadence_days
    cadence_days: 5
    channel: perso
    model: sonnet
    enabled: true

  local_activities:
    description: "Veille mensuelle activités locales (1h15 isochrone). Famille / art / intellectuel."
    cron: "0 7 1 * *"     # 1st of month, 07:00 UTC
    channel: perso        # canal famille déprécié — Isa n'utilise pas Telegram
    model: sonnet

  activities_next10days:
    description: "Sélection actionnable dans 10j depuis la liste local_activities."
    cron: "0 16 * * 4"    # Thursday 16:00 UTC (18:00 Paris)
    channel: perso        # canal famille déprécié
    model: haiku

  ai_jobs_formations:
    description: "Veille formations (MATS, ARENA, masters) + jobs AI / AI Safety."
    cron: "30 5 * * 2"    # Tuesday 05:30 UTC, gated by cadence_days
    cadence_days: 14
    channel: perso
    model: sonnet

  sydney_opportunities:
    description: "Focus Sydney + Suisse : jobs intello, news visa PR, leads."
    cron: "30 5 * * 3"    # Wednesday 05:30 UTC
    channel: perso
    model: sonnet

  weekly_briefing:
    description: "Briefing monde / IA / local, faits + analyse."
    cron: "0 17 * * 0"    # Sunday 17:00 UTC (19:00 Paris)
    channel: perso        # canal famille déprécié
    model: sonnet         # le sous-agent d'analyse utilise opus, géré dans le code

  weekly_lookahead:
    description: "Look-forward agenda 20j : vols, deadlines, RDV importants à anticiper."
    cron: "0 18 * * 0"    # Sunday 18:00 UTC (20:00 Paris)
    channel: perso
    model: haiku
    enabled: true

  network_followups:
    description: "Anniversaires à venir + relances dormantes."
    cron: "0 16 * * 1"    # Monday 16:00 UTC, gated by cadence_days
    cadence_days: 14
    channel: perso
    model: haiku

  daily_digest:
    description: "3-5 lignes Telegram matinal : drafts pendants, RDV du jour, 1 alerte."
    cron: "30 5 * * *"    # daily 05:30 UTC (07:30 Paris)
    channel: perso
    model: haiku
    vacation_safe: true
    enabled: true

  health_watch:
    description: "Veille santé evidence-based (Sylvain ; Isa ORL + contre-indication antibiotiques systémiques)."
    cron: "0 7 * * 5"     # Friday 07:00 UTC (09:00 Paris), gated by cadence_days
    cadence_days: 14
    channel: perso
    model: sonnet

  location_context:
    description: "Détecte voyages dans calendar + chats. Met à jour current-location.md (incl. flag vacances)."
    cron: "0 4 * * *"     # daily 04:00 UTC (06:00 Paris)
    channel: perso
    model: haiku
    vacation_safe: true

  findings_index:
    description: "Regénère digests/findings-by-tag.md et findings-by-month.md."
    cron: "0 2 * * 6"     # Saturday 02:00 UTC (04:00 Paris)
    channel: perso
    model: haiku

  self_reflection:
    description: "Méta-réflexion mensuelle + propositions d'amélioration (P0/P1/P2). Lit aussi journal/decisions.md et skip-patterns.md."
    cron: "0 18 15 * *"   # 15th of month, 18:00 UTC (20:00 Paris)
    channel: perso
    model: opus

  sliding_window:
    description: "Rollup mensuel des working-memory > 30j puis purge."
    cron: "0 3 * * *"     # daily 03:00 UTC
    channel: perso
    model: haiku
    vacation_safe: true

