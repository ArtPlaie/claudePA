# core-memory/outlook-axes.yaml — registre des axes de l'outlook horizon 3 mois.
#
# Lu par tasks/outlook.py qui tourne quotidiennement (cron daily 18h UTC).
# À chaque run, la tâche regarde la date du jour : si un axe matche
# `day_of_month`, on l'exécute. Sinon skip silent.
#
# Modifier ce fichier = pas besoin de toucher au code. Ajouter / retirer
# un axe, déplacer un day_of_month, changer le tier modèle : tout est ici.
#
# Étalement : tous les 7 jours pour ne pas surcharger une semaine.

horizon_months: 3

defaults:
  tier: sonnet
  web_search_max: 8

axes:
  - slug: opportunites-pro
    title: "💼 Opportunités pro"
    day_of_month: 1
    tier: opus
    web_search_max: 15
    focus: |
      Postes / fellowships / formations en AI safety / alignment, remote-first
      en priorité. Si déménagement nécessaire, géos acceptables avec extra
      focus Sydney (PR existant) et Suisse :
      - Sydney : pour cette géo spécifiquement, élargis à toute opportunité
        pro AI-related sérieuse (pas que safety strict).
      - Suisse : Zurich, Lausanne, EPFL / ETH, orgs locales.
      - Californie : Bay Area, SF (labs).
      - Canada : Toronto, Montréal (Mila).

      Orgs labs à scanner : Anthropic, OpenAI, DeepMind, Conjecture, Redwood,
      METR, Apollo, Goodfire, FAR AI. Gouv : UK AISI, US AISI. Acad : CHAI
      Berkeley, Mila, ARC Evals.
      Formations alignment : MATS, ARENA, Anthropic Fellows, SERI MATS,
      Astra Fellowship, masters spécialisés.

      Surveille aussi : 1 ligne sur la situation visa AU (RRV / travel
      facility) si actualité notable, sinon zappe.

      # Format de sortie en DEUX sections marquées textuellement
      #
      # Le code Python split sur les marqueurs et envoie seulement la
      # partie TELEGRAM sur le téléphone de Sylvain. La partie ARCHIVE
      # reste dans working-memory comme source locale.

      === TELEGRAM ===
      Top 15 items les plus saillants pour Sylvain.
      Ordonnés par priorité (urgence deadline + fit profil).
      Pour chaque item : 2-4 lignes (titre, orga, géo, deadline si connue,
      pourquoi ça vaut le coup) + 1 URL source la plus actionnable.
      Termine la section TELEGRAM par "## À planifier" (2-5 bullets).

      === ARCHIVE ===
      Liste exhaustive de tout ce que la recherche a remonté qui mérite
      d'être archivé : opportunités borderline, postes de second rang,
      formations à surveiller plus tard, orgs nouvelles à connaître,
      signaux faibles. Pas de cap, format plus libre — sert de source
      locale pour la mémoire long terme (réutilisable par les briefings
      suivants pour ne pas répéter).
    queries_hints:
      - "AI safety researcher remote close 2026"
      - "AI alignment job Sydney Australia"
      - "AI research job Switzerland Zurich Lausanne EPFL"
      - "MATS ARENA Anthropic Fellows 2026 applications"
      - "AI policy job Canada Toronto Montreal Mila"

  - slug: serendipite
    title: "✨ Sérendipité de la semaine"
    day_of_month: 7
    tier: opus
    web_search_max: 10
    focus: |
      Self-prompt totalement libre. Aucune catégorie obligatoire.

      Pioche dans tout ce que tu sais de Sylvain (profile.md, decisions,
      findings, current-location, family.md, saison, actu, météo) pour
      proposer ce qui pourrait l'intéresser cette période-ci.

      Cible : 5-8 propositions concrètes, inattendues mais pas absurdes.
      Si tu hésites entre "safe et utile" et "original et un peu fou",
      choisis original.

      Pense large : exposition niche, livre récent, projet code de weekend,
      podcast / vidéo d'auteur, événement IRL, idée business, lecture qui
      sort de sa filter bubble, expérience physique nouvelle, angle d'attaque
      inhabituel sur un de ses projets en cours.

      Évite les recos génériques type "top 10 books". Précise les références
      (nom, lien, contexte) — Sylvain juge sur pièces.
    queries_hints:
      - "exposition Paris cette semaine confidentielle"
      - "événement Paris weekend insolite original"
      - "essai récent sortie 2026 auteur inattendu"
      - "podcast français nouveau penseur"
      - "expérience originale Paris adultes 2026"

  - slug: famille
    title: "👨‍👩‍👧 Famille — sorties & idées"
    day_of_month: 14
    tier: opus
    web_search_max: 10
    focus: |
      Mix factuel + créatif pour la famille (cf. family.md pour âges,
      goûts enfants, contraintes Isa).

      Factuel (60% du brief) : sorties / événements / expos Île-de-France
      concrets dans les 4-6 semaines à venir, avec dates et lieux précis.
      Inclut événements temporaires en musées, festivals enfants, expos
      famille, ateliers, spectacles.

      Créatif (40% du brief) : 2-3 idées originales pour proposer à la
      famille selon family.md, saison, météo, humeur du moment. Sortir
      des classiques évidents (Cité des Sciences, Louvre kids) — sauf
      si un événement temporaire vraiment chouette y passe.
    queries_hints:
      - "expositions enfants Paris 2026"
      - "sorties famille Île-de-France weekend"
      - "événement enfants Paris ce mois 2026"
      - "musée moins connu Paris famille"
      - "spectacle enfants Paris programmation"

  - slug: decouvertes
    title: "🎯 Découvertes du mois — sélection cadrée"
    day_of_month: 21
    tier: opus
    web_search_max: 10
    focus: |
      Sélection structurée — une ligne par catégorie, pas plus.

      Catégories à remplir (toutes obligatoires sauf si rien de saillant) :
      1. 📚 1 livre (essai / fiction sérieuse) récent ou intemporel à
         découvrir, pas du déjà-mainstream pour Sylvain.
      2. 🎨 1 exposition (Paris ou plus loin si vaut le déplacement) à voir
         dans les 3 mois.
      3. 💻 1 projet code weekend ou expérience tech à tenter (lien repo
         ou article qui sert de point de départ).
      4. 🏃 1 sortie physique nouvelle (sport, balade originale, défi).
      5. 🎧 1 podcast / vidéo / longread d'un auteur que Sylvain ne suit
         probablement pas encore.
      6. 🧠 1 sujet de réflexion ou question stratégique à creuser ce mois.

      Critères : pas du déjà vu / déjà mainstream pour Sylvain (cf.
      profile.md, decisions.md). Si une catégorie ne donne rien de
      saillant ce mois, dis "rien de saillant" plutôt que remplir mou.
    queries_hints:
      - "essai 2026 best meilleur livre"
      - "expo majeure Paris 2026 programme"
      - "open source project AI safety alignment 2026"
      - "podcast intellectuel recommandé 2026"
      - "longread Atlantic New Yorker 2026"

  - slug: veille-medicale
    title: "🔬 Veille médicale — breakthroughs sérieux"
    day_of_month: 28
    tier: opus
    web_search_max: 12
    focus: |
      État de l'art médical, brief mensuel. Règle absolue : ZÉRO bullshit,
      ZÉRO hype. Filtre dur contre influenceurs longévité (Bryan Johnson,
      Lifespan.io, ATTI A, Huberman quand il dérape), suppléments, wellness,
      quantified self, biohacking de salon.

      Sujets prioritaires :
      - **Longévité / aging biology** : ne remonte que ce qui est publié
        sérieusement (NEJM, Nature, Cell, Science, Aging Cell, Nature Aging,
        preprints solides avec sample size correct et méthode propre).
        Mentionne le niveau de preuve (in vitro / souris / phase I / II / III)
        et ce qui est cliniquement actionnable maintenant vs spéculation.
      - **Sinusite chronique non polypeuse (CRSsNP)** : pathophysiologie,
        nouveaux traitements, biologics, recherche endotypes, dupilumab et
        autres anti-IL hors polypose. Lit aussi les rétractions / debunks.

      Sujets secondaires : breakthroughs cliniquement actionnables sur
      d'autres pathos courantes — pas du basic science abstrait.

      Format de sortie :
      - Une étude / breakthrough = 3-5 lignes : ce qui est nouveau, niveau
        de preuve, ce que ça change concrètement, lien direct (DOI/pubmed
        de préférence, pas un article de vulgarisation).
      - "Pas de breakthrough sérieux ce mois sur cet axe" si rien ne mérite —
        c'est une réponse valable, pas un échec.
    queries_hints:
      - "longevity clinical trial peer reviewed 2026"
      - "aging biology breakthrough Nature Cell 2026"
      - "chronic rhinosinusitis without nasal polyps treatment 2026"
      - "CRSsNP biologics dupilumab phase trial"
      - "NEJM Lancet aging therapy 2026"
